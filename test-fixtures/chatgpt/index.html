<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ChatGPT fixture</title>
    <style>
      body {
        font: 16px system-ui;
        margin: 40px;
        background: #f7f7f8;
      }
      main {
        max-width: 760px;
        margin: auto;
      }
      button {
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ChatGPT test fixture</h1>
      <button id="state" aria-label="Stop generating">Stop</button
      ><button id="mutate">Duplicate mutations</button
      ><button id="finish">Finish generation</button
      ><button id="navigate">SPA navigation</button>
    </main>
    <script>
      const state = document.querySelector("#state");
      document.querySelector("#finish").onclick = () => {
        state.setAttribute("aria-label", "Send message");
        state.textContent = "Send";
      };
      document.querySelector("#mutate").onclick = () => {
        for (let i = 0; i < 8; i++) state.setAttribute("data-state", String(i));
      };
      document.querySelector("#navigate").onclick = () => {
        history.pushState({}, "", "/new-chat");
        state.setAttribute("aria-label", "Stop generating");
      };
    </script>
  </body>
</html>
